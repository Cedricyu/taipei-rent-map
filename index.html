<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台北租屋分析地圖｜台北市 + 中永和</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --surface-1: #fcfcfb;
  --page: #f9f9f7;
  --ink-1: #0b0b0b;
  --ink-2: #52514e;
  --muted: #898781;
  --grid: #e1e0d9;
  --baseline: #c3c2b7;
  --border: rgba(11,11,11,0.10);
  --blue: #2a78d6;
  --aqua: #1baf7a;
  --yellow: #eda100;
  --violet: #4a3aa7;
  --seq-250: #86b6ef;
  --seq-350: #5598e7;
  --seq-450: #2a78d6;
  --seq-550: #1c5cab;
  --seq-700: #0d366b;
}
@media (prefers-color-scheme: dark) {
  :root {
    --surface-1: #1a1a19;
    --page: #0d0d0d;
    --ink-1: #ffffff;
    --ink-2: #c3c2b7;
    --muted: #898781;
    --grid: #2c2c2a;
    --baseline: #383835;
    --border: rgba(255,255,255,0.10);
    --blue: #3987e5;
    --aqua: #199e70;
    --yellow: #c98500;
    --violet: #9085e9;
  }
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: system-ui, -apple-system, "Segoe UI", "Microsoft JhengHei", sans-serif;
  background: var(--page);
  color: var(--ink-1);
  line-height: 1.5;
}
header {
  padding: 20px 24px 4px;
}
header h1 { font-size: 1.35rem; font-weight: 700; }
header p { color: var(--ink-2); font-size: 0.85rem; }
.wrap { padding: 12px 24px 40px; max-width: 1500px; margin: 0 auto; }

/* layout */
.main { display: grid; grid-template-columns: 250px 1fr; gap: 14px; align-items: start; }
@media (max-width: 900px) { .main { grid-template-columns: 1fr; } }

/* filters */
.panel {
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
}
.panel h3 { font-size: 0.8rem; color: var(--muted); font-weight: 600; margin: 12px 0 6px; text-transform: uppercase; letter-spacing: .04em; }
.panel h3:first-child { margin-top: 0; }
.dist-group { display: flex; flex-wrap: wrap; gap: 5px; }
.chip {
  font-size: 0.75rem;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--ink-2);
  border-radius: 20px;
  padding: 3px 10px;
  cursor: pointer;
  user-select: none;
}
.chip.on { background: var(--blue); border-color: var(--blue); color: #fff; }
.rangebox { display: flex; align-items: center; gap: 6px; }
.rangebox input {
  width: 100%;
  padding: 5px 8px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--page);
  color: var(--ink-1);
  font-size: 0.82rem;
}
.rangebox span { color: var(--muted); font-size: .8rem; }
select, input[type="text"] {
  width: 100%;
  padding: 5px 8px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--page);
  color: var(--ink-1);
  font-size: 0.82rem;
}
.linkbtn { background: none; border: none; color: var(--blue); font-size: .75rem; cursor: pointer; padding: 0; margin-top: 4px; }
.overlay-row { display: flex; align-items: center; gap: 6px; font-size: .82rem; color: var(--ink-2); margin: 3px 0; cursor: pointer; }
.reco-item { padding: 6px 8px; margin: 4px 0; border: 1px solid var(--grid); border-radius: 8px; font-size: .78rem; cursor: pointer; }
.reco-item:hover { background: rgba(74,58,167,.08); }
.reco-item .r-sub { color: var(--muted); }
.dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

/* map */
#map {
  height: 620px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface-1);
}
.map-legend {
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 0.72rem;
  color: var(--ink-2);
  line-height: 1.7;
}
.map-legend .row { display: flex; align-items: center; gap: 7px; }
.leaflet-popup-content { font-family: inherit; font-size: 0.82rem; line-height: 1.45; }
.leaflet-popup-content .pp-title { font-weight: 700; font-size: .88rem; margin-bottom: 2px; }
.leaflet-popup-content .pp-price { color: #b3261e; font-weight: 700; }
.leaflet-popup-content a { color: var(--blue); }
.leaflet-popup-content .pp-note { color: #898781; font-size: .72rem; }

/* table */
.table-card { margin-top: 14px; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
th, td { text-align: left; padding: 7px 10px; border-bottom: 1px solid var(--grid); white-space: nowrap; }
th { color: var(--muted); font-weight: 600; cursor: pointer; user-select: none; position: sticky; top: 0; background: var(--surface-1); }
th .arrow { font-size: .65rem; }
td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
td a { color: var(--blue); text-decoration: none; }
td a:hover { text-decoration: underline; }
.count-note { font-size: .75rem; color: var(--muted); margin: 6px 0; }
footer { color: var(--muted); font-size: .72rem; margin-top: 24px; text-align: center; }
#loading { padding: 60px; text-align: center; color: var(--muted); }
</style>
</head>
<body>
<header>
  <h1>台北租屋分析地圖</h1>
  <p>台北市 12 區 + 新北市中和/永和 ・ 資料來源：591 租屋網（僅供學習分析用途）</p>
</header>
<div class="wrap">
  <div id="loading">資料載入中…</div>
  <div id="app" style="display:none">
    <div class="main">
      <div class="panel">
        <h3>行政區</h3>
        <div class="dist-group" id="dist-tp"></div>
        <h3 style="margin-top:8px">新北市（中永和）</h3>
        <div class="dist-group" id="dist-nt"></div>
        <button class="linkbtn" id="dist-all">全選</button>
        <button class="linkbtn" id="dist-none">全不選</button>

        <h3>月租金（元）</h3>
        <div class="rangebox">
          <input type="number" id="f-pmin" placeholder="最低" step="1000">
          <span>–</span>
          <input type="number" id="f-pmax" placeholder="最高" step="1000">
        </div>

        <h3>坪數</h3>
        <div class="rangebox">
          <input type="number" id="f-amin" placeholder="最低">
          <span>–</span>
          <input type="number" id="f-amax" placeholder="最高">
        </div>

        <h3>房數</h3>
        <select id="f-rooms">
          <option value="">不限</option>
          <option value="1">1 房</option>
          <option value="2">2 房</option>
          <option value="3">3 房</option>
          <option value="4+">4 房以上</option>
          <option value="0">套房/未標示</option>
        </select>

        <h3>類型</h3>
        <select id="f-kind">
          <option value="">不限</option>
          <option value="整層住家">整層住家</option>
          <option value="獨立套房">獨立套房</option>
          <option value="分租套房">分租套房</option>
          <option value="雅房">雅房</option>
        </select>

        <h3>其他條件</h3>
        <label class="overlay-row"><input type="checkbox" id="f-pet"> 🐶 可養寵物</label>
        <label class="overlay-row"><input type="checkbox" id="f-cook"> 🍳 可開伙</label>
        <label class="overlay-row"><input type="checkbox" id="f-elev"> 🛗 有電梯</label>
        <label class="overlay-row"><input type="checkbox" id="f-park"> 🚗 附車位</label>

        <h3>關鍵字</h3>
        <input type="text" id="f-kw" placeholder="標題或地址，如：捷運">

        <h3>🎯 最划算推薦</h3>
        <div id="reco-list"></div>

        <h3>地圖圖層</h3>
        <label class="overlay-row"><input type="checkbox" id="ov-mrt"> <span class="dot" style="background:var(--violet)"></span> 捷運出入口</label>
        <label class="overlay-row"><input type="checkbox" id="ov-bike"> <span class="dot" style="background:var(--yellow)"></span> YouBike 站點</label>
      </div>

      <div id="map"></div>
    </div>

    <div class="panel table-card">
      <h2 style="font-size:.92rem">物件清單</h2>
      <div class="count-note" id="tbl-note"></div>
      <table id="tbl">
        <thead><tr>
          <th class="num" data-k="reco">推薦分 <span class="arrow"></span></th>
          <th data-k="title">標題</th>
          <th data-k="district">區域</th>
          <th data-k="address">地址</th>
          <th class="num" data-k="price">月租金 <span class="arrow"></span></th>
          <th class="num" data-k="area">坪數 <span class="arrow"></span></th>
          <th class="num" data-k="pp">每坪 <span class="arrow"></span></th>
          <th data-k="layout">格局</th>
          <th data-k="kind">型態</th>
          <th data-k="pet">寵物</th>
          <th data-k="floor">樓層</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <footer>資料為爬取當日快照，僅供個人分析學習使用。地圖 © OpenStreetMap 貢獻者。</footer>
  </div>
</div>

<script>
const TP_DISTRICTS = ["中正區","大同區","中山區","松山區","大安區","萬華區","信義區","士林區","北投區","內湖區","南港區","文山區"];
const NT_DISTRICTS = ["永和區","中和區"];
const ALL_DISTRICTS = [...TP_DISTRICTS, ...NT_DISTRICTS];

let LISTINGS = [], OVERLAYS = {mrt: [], youbike: []};
let map, markerLayer, mrtLayer, bikeLayer;
let activeDistricts = new Set(ALL_DISTRICTS);
let sortKey = "reco", sortAsc = false;

/* ---------- 推薦分數 （CP值） ---------- */
function recoScore(l) {
  return l.s_value ?? 50;
}

const css = name => getComputedStyle(document.documentElement).getPropertyValue(name).trim();
const fmt = n => n == null ? "–" : Math.round(n).toLocaleString("zh-TW");

/* 推薦程度分級（sequential blue，越深越划算） */
const RECO_BINS = [
  { min: 80, color: "#0d366b", label: "80+（最划算）" },
  { min: 60, color: "#1c5cab", label: "60 – 80" },
  { min: 40, color: "#2a78d6", label: "40 – 60" },
  { min: 20, color: "#5598e7", label: "20 – 40" },
  { min: -1, color: "#b7d3f3", label: "< 20（比行情貴）" },
];
const recoColor = l => RECO_BINS.find(b => recoScore(l) >= b.min).color;

/* ---------- 篩選 ---------- */
function currentFilter() {
  const pmin = +document.getElementById("f-pmin").value || 0;
  const pmax = +document.getElementById("f-pmax").value || Infinity;
  const amin = +document.getElementById("f-amin").value || 0;
  const amax = +document.getElementById("f-amax").value || Infinity;
  const rooms = document.getElementById("f-rooms").value;
  const kind = document.getElementById("f-kind").value;
  const needPet = document.getElementById("f-pet").checked;
  const needCook = document.getElementById("f-cook").checked;
  const needElev = document.getElementById("f-elev").checked;
  const needPark = document.getElementById("f-park").checked;
  const kw = document.getElementById("f-kw").value.trim();
  return LISTINGS.filter(l => {
    if (!activeDistricts.has(l.district)) return false;
    if (l.price == null || l.price < pmin || l.price > pmax) return false;
    if (l.area != null && (l.area < amin || l.area > amax)) return false;
    if (l.area == null && (amin > 0 || amax < Infinity)) { /* 未標坪數者僅在未設坪數條件時顯示 */ if (amin > 0) return false; }
    if (rooms === "0" && l.rooms != null) return false;
    else if (rooms === "4+" && (l.rooms == null || l.rooms < 4)) return false;
    else if (rooms && rooms !== "0" && rooms !== "4+" && l.rooms !== +rooms) return false;
    if (kind && !(l.kind || "").includes(kind)) return false;
    if (needPet && l.pet !== true) return false;
    if (needCook && l.cook !== true) return false;
    if (needElev && l.elevator !== true) return false;
    if (needPark && l.has_parking !== true) return false;
    if (kw && !(l.title + (l.address||"")).includes(kw)) return false;
    return true;
  });
}

/* ---------- 地圖 ---------- */
function initMap() {
  map = L.map("map", { preferCanvas: true }).setView([25.03, 121.53], 12);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "© OpenStreetMap"
  }).addTo(map);

  markerLayer = L.layerGroup().addTo(map);

  mrtLayer = L.layerGroup();
  OVERLAYS.mrt.forEach(s => {
    L.circleMarker([s.lat, s.lng], { radius: 3.5, color: "#fff", weight: 1, fillColor: css("--violet") || "#4a3aa7", fillOpacity: 0.95 })
      .bindPopup(`🚇 ${s.name}`).addTo(mrtLayer);
  });
  bikeLayer = L.layerGroup();
  OVERLAYS.youbike.forEach(s => {
    L.circleMarker([s.lat, s.lng], { radius: 2.5, color: "#fff", weight: .8, fillColor: "#eda100", fillOpacity: 0.9 })
      .bindPopup(`🚲 ${s.name}`).addTo(bikeLayer);
  });

  const legend = L.control({ position: "bottomright" });
  legend.onAdd = () => {
    const div = L.DomUtil.create("div", "map-legend");
    div.innerHTML = "<b>推薦分（CP值）</b>" + RECO_BINS.map(b =>
      `<div class="row"><span class="dot" style="background:${b.color}"></span>${b.label}</div>`).join("");
    return div;
  };
  legend.addTo(map);

  document.getElementById("ov-mrt").addEventListener("change", e =>
    e.target.checked ? mrtLayer.addTo(map) : map.removeLayer(mrtLayer));
  document.getElementById("ov-bike").addEventListener("change", e =>
    e.target.checked ? bikeLayer.addTo(map) : map.removeLayer(bikeLayer));
}

let markerById = {};
function renderMap(rows) {
  markerLayer.clearLayers();
  markerById = {};
  rows.forEach(l => {
    const pp = l.area > 1 ? Math.round(l.price / l.area).toLocaleString() : "–";
    const m = L.circleMarker([l.lat, l.lng], {
      radius: 6, color: "#ffffff", weight: 1.2,
      fillColor: recoColor(l), fillOpacity: 0.92
    });
    const conds = [
      l.pet === true ? "🐶 可養寵物" : (l.pet === false ? "🚫 不可寵物" : ""),
      l.cook === true ? "🍳 可開伙" : "",
      l.elevator === true ? "🛗 電梯" : "",
      l.has_parking === true ? "🚗 車位" : "",
    ].filter(Boolean).join("　");
    const diff = l.pred_price ? Math.round((l.price - l.pred_price) / l.pred_price * 100) : null;
    m.bindPopup(`
      <div class="pp-title">${l.title}</div>
      <div>${l.district}・${l.address || ""}</div>
      <div class="pp-price">${fmt(l.price)} 元/月</div>
      <div>💰 CP值分數 <b>${Math.round(recoScore(l))}</b>${l.pred_price ? `｜行情約 ${fmt(l.pred_price)} 元` : ""}${diff != null && !l.anomaly ? `（${diff <= 0 ? "便宜" : "貴"} ${Math.abs(diff)}%）` : ""}</div>
      ${l.anomaly ? '<div class="pp-note">⚠ 租金遠低於行情，可能為床位/共居/非整戶，請留意</div>' : ""}
      ${l.mrt_m != null ? `<div>🚇 最近捷運出入口 ${l.mrt_m >= 1000 ? (l.mrt_m/1000).toFixed(1) + " 公里" : l.mrt_m + " 公尺"}｜🚲 500m 內 YouBike ${l.bike_n} 站</div>` : ""}
      <div>${l.kind ? l.kind + "・" : ""}${l.building ? l.building + "・" : ""}${l.area ? l.area + " 坪" : ""} ${l.layout ? "・" + l.layout : ""} ${l.floor_now ? `・${l.floor_now}/${l.floor_total}樓` : ""}${l.age ? `・屋齡${l.age}年` : ""}</div>
      <div>每坪約 ${pp} 元</div>
      ${conds ? `<div>${conds}</div>` : ""}
      <a href="${l.href}" target="_blank" rel="noopener">查看物件 ↗</a>
      ${l.geo_approx ? '<div class="pp-note">⚠ 位置為區內約略位置</div>' : ''}
    `);
    markerLayer.addLayer(m);
    markerById[l.house_id] = m;
  });
}

/* ---------- Top 10 推薦清單 ---------- */
function renderReco(rows) {
  const top = rows
    .filter(l => !l.anomaly)
    .map(l => ({ l, s: recoScore(l) }))
    .sort((a, b) => b.s - a.s)
    .slice(0, 10);
  const box = document.getElementById("reco-list");
  box.innerHTML = top.map(({ l, s }) => `
    <div class="reco-item" data-id="${l.house_id}">
      ${l.title.slice(0, 18)}
      <div class="r-sub">${l.district}・${fmt(l.price)} 元${l.pred_price && l.price < l.pred_price ? `・比行情省 ${Math.round((1 - l.price / l.pred_price) * 100)}%` : ""}</div>
    </div>`).join("");
  box.querySelectorAll(".reco-item").forEach(el => el.addEventListener("click", () => {
    const l = LISTINGS.find(x => x.house_id === el.dataset.id);
    if (!l) return;
    map.setView([l.lat, l.lng], 16);
    const m = markerById[l.house_id];
    if (m) m.openPopup();
    document.getElementById("map").scrollIntoView({ behavior: "smooth", block: "center" });
  }));
}

/* ---------- 表格 ---------- */
function renderTable(rows) {
  const enriched = rows.map(r => ({ ...r, reco: recoScore(r), pp: r.area > 1 ? r.price / r.area : null, floor: r.floor_now ? `${r.floor_now}/${r.floor_total}` : "" }));
  enriched.sort((a, b) => {
    let va = a[sortKey], vb = b[sortKey];
    if (va == null) return 1;
    if (vb == null) return -1;
    if (typeof va === "string") return sortAsc ? va.localeCompare(vb, "zh-TW") : vb.localeCompare(va, "zh-TW");
    return sortAsc ? va - vb : vb - va;
  });
  const shown = enriched.slice(0, 100);
  document.getElementById("tbl-note").textContent =
    `顯示 ${shown.length} / ${rows.length} 筆（點欄位標題可排序）`;
  const tbody = document.querySelector("#tbl tbody");
  tbody.innerHTML = shown.map(r => `
    <tr>
      <td class="num"><b>${Math.round(r.reco)}</b></td>
      <td><a href="${r.href}" target="_blank" rel="noopener">${r.title}</a></td>
      <td>${r.city === "新北市" ? "新北・" : ""}${r.district}</td>
      <td>${r.address || ""}</td>
      <td class="num">${fmt(r.price)}</td>
      <td class="num">${r.area ?? ""}</td>
      <td class="num">${r.pp ? fmt(r.pp) : ""}</td>
      <td>${r.layout || ""}</td>
      <td>${r.kind || ""}</td>
      <td>${r.pet === true ? "🐶 可" : (r.pet === false ? "不可" : "")}</td>
      <td>${r.floor}</td>
    </tr>`).join("");
  document.querySelectorAll("#tbl th").forEach(th => {
    th.querySelector(".arrow") && (th.querySelector(".arrow").textContent =
      th.dataset.k === sortKey ? (sortAsc ? "▲" : "▼") : "");
  });
}

/* ---------- 主更新 ---------- */
function update() {
  const rows = currentFilter();
  renderMap(rows);
  renderTable(rows);
  renderReco(rows);
}

/* ---------- 初始化 ---------- */
function buildDistrictChips() {
  const mk = (d, parent) => {
    const b = document.createElement("button");
    b.className = "chip on";
    b.textContent = d.replace("區", "");
    b.onclick = () => {
      if (activeDistricts.has(d)) { activeDistricts.delete(d); b.classList.remove("on"); }
      else { activeDistricts.add(d); b.classList.add("on"); }
      update();
    };
    b.dataset.d = d;
    parent.appendChild(b);
  };
  TP_DISTRICTS.forEach(d => mk(d, document.getElementById("dist-tp")));
  NT_DISTRICTS.forEach(d => mk(d, document.getElementById("dist-nt")));
  document.getElementById("dist-all").onclick = () => {
    activeDistricts = new Set(ALL_DISTRICTS);
    document.querySelectorAll(".chip").forEach(c => c.classList.add("on"));
    update();
  };
  document.getElementById("dist-none").onclick = () => {
    activeDistricts.clear();
    document.querySelectorAll(".chip").forEach(c => c.classList.remove("on"));
    update();
  };
}

let debounceT;
function bindFilters() {
  ["f-pmin","f-pmax","f-amin","f-amax","f-kw"].forEach(id =>
    document.getElementById(id).addEventListener("input", () => {
      clearTimeout(debounceT);
      debounceT = setTimeout(update, 300);
    }));
  document.getElementById("f-rooms").addEventListener("change", update);
  document.getElementById("f-kind").addEventListener("change", update);
  ["f-pet","f-cook","f-elev","f-park"].forEach(id =>
    document.getElementById(id).addEventListener("change", update));
  document.querySelectorAll("#tbl th").forEach(th =>
    th.addEventListener("click", () => {
      const k = th.dataset.k;
      if (sortKey === k) sortAsc = !sortAsc;
      else { sortKey = k; sortAsc = true; }
      renderTable(currentFilter());
    }));
}

async function boot() {
  const [lr, or] = await Promise.all([
    fetch("listings.json"), fetch("overlays.json").catch(() => null)
  ]);
  LISTINGS = (await lr.json()).filter(l => l.price > 0 && l.lat && l.lng);
  if (or && or.ok) OVERLAYS = await or.json();

  document.getElementById("loading").style.display = "none";
  document.getElementById("app").style.display = "block";
  buildDistrictChips();
  bindFilters();
  initMap();
  update();
}
boot().catch(e => {
  document.getElementById("loading").textContent = "資料載入失敗：" + e.message + "（請先執行 scraper.py 與 geocode.py）";
});
</script>
</body>
</html>
